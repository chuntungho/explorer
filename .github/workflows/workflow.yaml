name: Build Explorer

on:
  workflow_dispatch: #  manual
  push:
    branches: [ main, micronaut-migration ]
    paths:
      - 'build.gradle'
      - 'src/**'
      - 'Dockerfile.native'
      - '.github/workflows/workflow.yaml'

env:
  IMAGE_NAME: ${{ vars.DOCKER_REGISTRY }}/chuntung/explorer

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push native image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.native
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
            ${{ env.IMAGE_NAME }}:micronaut
 
  deploy:
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Deploy in remote server
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script_stop: true
          script: |
            kubectl rollout restart deployment explorer
