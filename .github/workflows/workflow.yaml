name: Build Explorer

on:
  workflow_dispatch: #  manual
  push:
    branches: [ main, micronaut-migration ]
    paths:
      - 'build.gradle'
      - 'src/**'
      - '.github/workflows/workflow.yaml'

env:
  IMAGE_NAME: ${{ vars.DOCKER_REGISTRY }}/chuntung/explorer

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          native-image: 'true'
          cache: 'gradle'

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push native Docker image
        run: ./gradlew dockerBuildNative dockerPushNative
        env:
          DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY }}
          GITHUB_SHA: ${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build

    steps:
      - name: Deploy in remote server
        uses: appleboy/ssh-action@v1.0.2
        with:
          host: ${{ vars.SERVER_HOST }}
          port: ${{ vars.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script_stop: true
          script: |
            kubectl rollout restart deployment explorer
